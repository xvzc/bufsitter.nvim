name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install commitlint
        run: npm install --save-dev @commitlint/cli @commitlint/config-conventional conventional-changelog-conventionalcommits

      - name: Lint commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  test:
    name: Test (Neovim ${{ matrix.neovim-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim-version: ["0.10.4", "0.11.7", "nightly"]
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim-version }}

      - name: Run tests
        run: make test

  check-docs:
    name: Check Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install lemmy-help
        run: |
          curl -sL https://github.com/numToStr/lemmy-help/releases/latest/download/lemmy-help-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C /usr/local/bin

      - name: Check docs
        run: make check-docs
